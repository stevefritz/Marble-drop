<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Marble Drop Builder</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #1a1a2e;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
}

#app {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
}

/* ===== HOPPER BAR ===== */
#hopper-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: #16213e;
  border-bottom: 2px solid #0f3460;
  min-height: 74px;
  flex-shrink: 0;
}

.color-section {
  display: flex;
  align-items: center;
  gap: 8px;
}

.color-label {
  color: #6a8abf;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  writing-mode: horizontal-tb;
}

.color-btn {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 4px solid transparent;
  cursor: pointer;
  transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
  flex-shrink: 0;
  outline: none;
}
.color-btn.active {
  border-color: white;
  transform: scale(1.18);
  box-shadow: 0 0 12px rgba(255,255,255,0.4);
}
.color-btn:active { transform: scale(0.93); }

.divider-v {
  width: 2px;
  height: 50px;
  background: #0f3460;
  flex-shrink: 0;
  margin: 0 4px;
}

.count-section {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.count-label {
  color: #6a8abf;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  margin-right: 2px;
}

.count-btn {
  width: 46px;
  height: 46px;
  border-radius: 10px;
  background: #0f3460;
  color: white;
  font-size: 22px;
  font-weight: bold;
  border: 2px solid #1a4a7a;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
  flex-shrink: 0;
}
.count-btn:active { background: #1a5f8a; }

#count-display {
  color: white;
  font-size: 24px;
  font-weight: 900;
  min-width: 48px;
  text-align: center;
}

#drop-btn {
  margin-left: auto;
  height: 62px;
  min-width: 110px;
  padding: 0 24px;
  background: linear-gradient(135deg, #ff6b35 0%, #ff3333 100%);
  color: white;
  font-size: 26px;
  font-weight: 900;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  letter-spacing: 3px;
  box-shadow: 0 4px 20px rgba(255, 60, 60, 0.55);
  transition: transform 0.12s, box-shadow 0.12s;
  flex-shrink: 0;
  outline: none;
}
#drop-btn:active {
  transform: scale(0.92);
  box-shadow: 0 2px 8px rgba(255, 60, 60, 0.4);
}

/* ===== MAIN AREA ===== */
#main-area {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-width: 0;
}

#gameCanvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}

/* ===== TOOL PALETTE ===== */
#tool-palette {
  width: 164px;
  flex-shrink: 0;
  background: #16213e;
  border-left: 2px solid #0f3460;
  display: flex;
  flex-direction: column;
  padding: 10px 8px;
  gap: 6px;
  overflow-y: auto;
}

.palette-label {
  color: #6a8abf;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  text-align: center;
  padding: 4px 0 2px;
}

.tool-btn {
  width: 100%;
  height: 56px;
  border-radius: 12px;
  background: #0f3460;
  color: white;
  font-size: 15px;
  font-weight: 700;
  border: 3px solid transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: background 0.1s, border-color 0.1s;
  letter-spacing: 0.3px;
  outline: none;
}
.tool-btn.active {
  background: #1a4a7a;
  border-color: #4aacff;
  box-shadow: 0 0 10px rgba(74,172,255,0.25);
}
.tool-btn:active { opacity: 0.75; }

.palette-divider {
  height: 2px;
  background: #0f3460;
  margin: 3px 0;
}

#clear-btn {
  width: 100%;
  height: 52px;
  border-radius: 12px;
  background: #5c1515;
  color: #ffaaaa;
  font-size: 14px;
  font-weight: 700;
  border: 2px solid #7a2020;
  cursor: pointer;
  transition: background 0.1s;
  outline: none;
}
#clear-btn:active { background: #7a2020; }

.size-btns {
  display: flex;
  gap: 6px;
}
.size-btn {
  flex: 1;
  height: 46px;
  border-radius: 10px;
  background: #0f3460;
  color: white;
  font-size: 15px;
  font-weight: 800;
  border: 3px solid transparent;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s;
  outline: none;
}
.size-btn.active {
  background: #1a4a7a;
  border-color: #4aacff;
}
.size-btn:active { opacity: 0.75; }

.ball-count-badge {
  position: absolute;
  top: 6px;
  right: 8px;
  background: rgba(255,255,255,0.15);
  color: #aac;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 10px;
}
</style>
</head>
<body>
<div id="app">

  <!-- HOPPER BAR -->
  <div id="hopper-bar">
    <span class="color-label">Color:</span>
    <div class="color-section">
      <button class="color-btn active" id="btn-yellow" style="background:radial-gradient(circle at 35% 35%, #FFE566, #FFCC00)" title="Normal" onclick="setBallColor('yellow')"></button>
      <button class="color-btn" id="btn-red"    style="background:radial-gradient(circle at 35% 35%, #FF7777, #FF3333)" title="Fast"   onclick="setBallColor('red')"></button>
      <button class="color-btn" id="btn-blue"   style="background:radial-gradient(circle at 35% 35%, #66AAFF, #3366FF)" title="Heavy"  onclick="setBallColor('blue')"></button>
      <button class="color-btn" id="btn-green"  style="background:radial-gradient(circle at 35% 35%, #66EE66, #22BB22)" title="Bouncy" onclick="setBallColor('green')"></button>
    </div>

    <div class="divider-v"></div>

    <div class="count-section">
      <span class="count-label">Balls:</span>
      <button class="count-btn" onclick="changeBallCount(-1)">−</button>
      <div id="count-display">5</div>
      <button class="count-btn" onclick="changeBallCount(1)">+</button>
    </div>

    <button id="drop-btn" onclick="dropBalls()">DROP!</button>
  </div>

  <!-- MAIN AREA -->
  <div id="main-area">
    <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div id="tool-palette">
      <div class="palette-label">Tools</div>
      <button class="tool-btn active" id="btn-wall"   onclick="setTool('wall')">&#9646; Wall</button>
      <button class="tool-btn"        id="btn-curve"  onclick="setTool('curve')">~ Curve</button>
      <button class="tool-btn"        id="btn-peg"    onclick="setTool('peg')">&#9679; Peg</button>
      <button class="tool-btn"        id="btn-eraser" onclick="setTool('eraser')">X Erase</button>

      <div class="palette-divider"></div>
      <button id="clear-btn" onclick="clearAll()">Clear All</button>

      <div class="palette-divider"></div>
      <div class="palette-label">Grid Size</div>
      <div class="size-btns">
        <button class="size-btn"        id="size-S" onclick="setGridSize('small')">S</button>
        <button class="size-btn active" id="size-M" onclick="setGridSize('medium')">M</button>
        <button class="size-btn"        id="size-L" onclick="setGridSize('large')">L</button>
      </div>
    </div>
  </div>

</div>

<script>
'use strict';

// ============================================================
// CONFIG
// ============================================================
const GRID_SIZES = {
  small:  { cols: 8,  rows: 6  },
  medium: { cols: 12, rows: 9  },
  large:  { cols: 16, rows: 12 },
};

const BALL_PROPS = {
  yellow: { color: '#FFCC00', glow: '#FFE566', speed: 1.0, mass: 1.0,  restitution: 0.62, radius: 8 },
  red:    { color: '#FF3333', glow: '#FF8866', speed: 1.8, mass: 1.0,  restitution: 0.52, radius: 8 },
  blue:   { color: '#3366FF', glow: '#66AAFF', speed: 1.0, mass: 3.0,  restitution: 0.40, radius: 8 },
  green:  { color: '#22BB22', glow: '#66EE66', speed: 1.0, mass: 0.75, restitution: 0.96, radius: 8 },
};

const GRAVITY        = 680;   // px/s²
const FIXED_DT       = 1/60;  // fixed physics timestep
const MAX_BALLS      = 200;
const WALL_HALF_W    = 5;     // collision half-width of walls
const PEG_RADIUS     = 14;    // px
const DOT_RADIUS     = 5;     // px
const HANDLE_RADIUS  = 11;    // curve control-point handle
const SNAP_RADIUS    = 42;    // dot-snapping radius
const REST_SPEED     = 28;    // px/s threshold
const REST_TIME      = 1.4;   // seconds at low speed before atRest
const BALL_COUNTS    = [1, 5, 10, 25, 50];

// Bumper physics
const BUMPER_FACTOR_WALL  = 1.35;  // velocity boost multiplier on wall hit
const BUMPER_FACTOR_CURVE = 1.25;  // velocity boost multiplier on curve hit
const BUMPER_FACTOR_PEG   = 1.30;  // velocity boost multiplier on peg hit
const CURVE_TANG_BOOST    = 50;    // px/s tangential (scoop) boost on curve hit
const MAX_BALL_SPEED      = 900;   // px/s hard speed cap
const FLASH_DURATION      = 0.15;  // seconds for hit-flash visual
const FADE_DURATION       = 2.0;   // seconds for rest-fade
const FADE_DURATION_EXIT  = 0.4;   // seconds for out-of-zone fade
const PLAY_ZONE_MARGIN    = 0.10;  // outer 10% each side = center 80% play zone

// ============================================================
// STATE
// ============================================================
let canvas, ctx;
let dots = [];
let gridSpacing = 0, gridOffsetX = 0, gridOffsetY = 0;
let gridCols = 0, gridRows = 0;

let walls  = [];   // {ax,ay,bx,by}
let curves = [];   // {ax,ay,bx,by,cx,cy}  (quadratic bezier control pt)
let pegs   = [];   // {x,y,pulseTimer}
let balls  = [];   // {x,y,vx,vy,props,trail[],atRest,restTimer,fading,fadeTimer,opacity}

let currentTool      = 'wall';
let currentGridSize  = 'medium';
let currentBallColor = 'yellow';
let ballCountIdx     = 1;   // index into BALL_COUNTS

let isDrawing    = false;
let drawStart    = null;   // snapped dot {x,y}
let ghostPos     = null;   // current touch pos {x,y}
let editingCurve = null;   // curve whose handle is being dragged

let lastTimestamp = 0;
let physicsAccum  = 0;
let nextBallId    = 0;

// ============================================================
// GRID
// ============================================================
function setupGrid() {
  const padX = 12;   // tight horizontal padding — fills edge-to-edge
  const padY = 22;   // vertical breathing room
  const availW = canvas.width  - padX * 2;
  const availH = canvas.height - padY * 2;
  // Dynamically compute cols/rows from aspect ratio to fill canvas in both dimensions
  const targetSpacing = { small: 80, medium: 55, large: 38 }[currentGridSize];
  gridCols = Math.max(4, Math.round(availW / targetSpacing) + 1);
  gridRows = Math.max(3, Math.round(availH / targetSpacing) + 1);
  gridSpacing = Math.min(availW / (gridCols - 1), availH / (gridRows - 1));
  gridOffsetX = (canvas.width  - gridSpacing * (gridCols - 1)) / 2;
  gridOffsetY = (canvas.height - gridSpacing * (gridRows - 1)) / 2;

  dots = [];
  for (let r = 0; r < gridRows; r++) {
    for (let c = 0; c < gridCols; c++) {
      dots.push({ x: gridOffsetX + c * gridSpacing, y: gridOffsetY + r * gridSpacing });
    }
  }
}

function snapToDot(x, y) {
  const snapR = Math.min(SNAP_RADIUS, gridSpacing * 0.5);
  let best = null, bestDist = snapR;
  for (const d of dots) {
    const dist = Math.hypot(d.x - x, d.y - y);
    if (dist < bestDist) { bestDist = dist; best = d; }
  }
  return best;
}

// ============================================================
// CANVAS / RESIZE
// ============================================================
function resizeCanvas() {
  const container = document.getElementById('canvas-container');
  let w = container.clientWidth;
  let h = container.clientHeight;
  // Flex layout may not have computed dimensions yet on first run (e.g. iPad Safari)
  if (!w || !h) {
    const palette = document.getElementById('tool-palette');
    const hopper  = document.getElementById('hopper-bar');
    w = window.innerWidth  - (palette.offsetWidth  || 164);
    h = window.innerHeight - (hopper.offsetHeight  || 74);
  }
  canvas.width  = Math.max(w, 200);
  canvas.height = Math.max(h, 200);
  setupGrid();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  let cx, cy;
  if (e.changedTouches && e.changedTouches.length > 0) {
    cx = e.changedTouches[0].clientX;
    cy = e.changedTouches[0].clientY;
  } else if (e.touches && e.touches.length > 0) {
    cx = e.touches[0].clientX;
    cy = e.touches[0].clientY;
  } else {
    cx = e.clientX;
    cy = e.clientY;
  }
  return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}

// ============================================================
// INPUT HANDLING
// ============================================================
function onStart(x, y) {
  if (currentTool === 'peg') {
    const dot = snapToDot(x, y);
    if (dot && !pegs.some(p => Math.hypot(p.x - dot.x, p.y - dot.y) < 4)) {
      pegs.push({ x: dot.x, y: dot.y, pulseTimer: 0 });
    }
    return;
  }

  if (currentTool === 'eraser') {
    eraseAt(x, y);
    return;
  }

  // Curve handle drag?
  if (currentTool === 'curve') {
    for (const c of curves) {
      if (Math.hypot(c.cx - x, c.cy - y) <= HANDLE_RADIUS + 12) {
        editingCurve = c;
        return;
      }
    }
  }

  // Wall or Curve: start drawing from a dot
  const dot = snapToDot(x, y);
  if (dot) {
    isDrawing = true;
    drawStart = { x: dot.x, y: dot.y };
    ghostPos = { x, y };
  }
}

let lastEraseMs = 0;
function onMove(x, y) {
  if (editingCurve) {
    editingCurve.cx = x;
    editingCurve.cy = y;
    return;
  }
  if (isDrawing) {
    ghostPos = { x, y };
  }
  if (currentTool === 'eraser') {
    const now = Date.now();
    if (now - lastEraseMs > 80) { eraseAt(x, y); lastEraseMs = now; }
  }
}

function onEnd(x, y) {
  if (editingCurve) { editingCurve = null; return; }
  if (!isDrawing) return;
  isDrawing = false;

  const endDot = snapToDot(x, y);
  if (endDot && drawStart && Math.hypot(endDot.x - drawStart.x, endDot.y - drawStart.y) > 6) {
    const { x: ax, y: ay } = drawStart;
    const { x: bx, y: by } = endDot;
    if (currentTool === 'wall') {
      walls.push({ ax, ay, bx, by });
    } else if (currentTool === 'curve') {
      curves.push({ ax, ay, bx, by, cx: (ax+bx)/2, cy: (ay+by)/2 });
    }
  }
  drawStart = null;
  ghostPos = null;
}

function eraseAt(x, y) {
  const ED = 24; // extra erase dist

  // Pegs first
  for (let i = pegs.length - 1; i >= 0; i--) {
    if (Math.hypot(pegs[i].x - x, pegs[i].y - y) < PEG_RADIUS + ED) {
      pegs.splice(i, 1); return;
    }
  }
  // Curves
  for (let i = curves.length - 1; i >= 0; i--) {
    const c = curves[i];
    if (distToCurve(x, y, c) < WALL_HALF_W + ED ||
        Math.hypot(c.cx - x, c.cy - y) < HANDLE_RADIUS + ED) {
      curves.splice(i, 1); return;
    }
  }
  // Walls
  for (let i = walls.length - 1; i >= 0; i--) {
    const w = walls[i];
    if (distToSeg(x, y, w.ax, w.ay, w.bx, w.by) < WALL_HALF_W + ED) {
      walls.splice(i, 1); return;
    }
  }
}

function setupInput() {
  const opts = { passive: false };
  canvas.addEventListener('mousedown',  e => { e.preventDefault(); const p=getPos(e); onStart(p.x,p.y); });
  canvas.addEventListener('mousemove',  e => { e.preventDefault(); const p=getPos(e); onMove(p.x,p.y);  });
  canvas.addEventListener('mouseup',    e => { e.preventDefault(); const p=getPos(e); onEnd(p.x,p.y);   });
  canvas.addEventListener('mouseleave', e => { if(isDrawing||editingCurve){ const p=getPos(e); onEnd(p.x,p.y); } });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); const p=getPos(e); onStart(p.x,p.y); }, opts);
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); const p=getPos(e); onMove(p.x,p.y);  }, opts);
  canvas.addEventListener('touchend',   e => { e.preventDefault(); const p=getPos(e); onEnd(p.x,p.y);   }, opts);
  canvas.addEventListener('touchcancel',e => { isDrawing=false; editingCurve=null; drawStart=null; ghostPos=null; }, opts);
}

// ============================================================
// MATH HELPERS
// ============================================================
function closestPtOnSeg(px, py, ax, ay, bx, by) {
  const dx = bx-ax, dy = by-ay;
  const lenSq = dx*dx + dy*dy;
  if (lenSq < 0.001) return { x: ax, y: ay };
  const t = Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / lenSq));
  return { x: ax + t*dx, y: ay + t*dy };
}

function distToSeg(px, py, ax, ay, bx, by) {
  const cp = closestPtOnSeg(px, py, ax, ay, bx, by);
  return Math.hypot(px - cp.x, py - cp.y);
}

function bezierPt(t, ax, ay, cx, cy, bx, by) {
  const mt = 1 - t;
  return { x: mt*mt*ax + 2*mt*t*cx + t*t*bx, y: mt*mt*ay + 2*mt*t*cy + t*t*by };
}

function sampleCurve(c, n=20) {
  const segs = [];
  let prev = bezierPt(0, c.ax, c.ay, c.cx, c.cy, c.bx, c.by);
  for (let i = 1; i <= n; i++) {
    const pt = bezierPt(i/n, c.ax, c.ay, c.cx, c.cy, c.bx, c.by);
    segs.push({ ax: prev.x, ay: prev.y, bx: pt.x, by: pt.y });
    prev = pt;
  }
  return segs;
}

function distToCurve(x, y, c) {
  let min = Infinity;
  for (const s of sampleCurve(c, 12)) min = Math.min(min, distToSeg(x, y, s.ax, s.ay, s.bx, s.by));
  return min;
}

// ============================================================
// PHYSICS
// ============================================================
function reflectSeg(ball, ax, ay, bx, by, bumperFactor, flashTarget, tangBoost) {
  const cp = closestPtOnSeg(ball.x, ball.y, ax, ay, bx, by);
  const dx = ball.x - cp.x, dy = ball.y - cp.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const minD = ball.props.radius + WALL_HALF_W;
  if (dist >= minD || dist < 0.001) return false;

  const nx = dx/dist, ny = dy/dist;
  ball.x += nx * (minD - dist);
  ball.y += ny * (minD - dist);

  const dot = ball.vx*nx + ball.vy*ny;
  if (dot < 0) {
    const r = ball.props.restitution;
    ball.vx -= (1+r) * dot * nx;
    ball.vy -= (1+r) * dot * ny;
    // Light friction tangential
    ball.vx *= 0.995;
    ball.vy *= 0.995;
    // Bumper boost — impart momentum like a pinball bumper
    if (bumperFactor > 1) {
      ball.vx *= bumperFactor;
      ball.vy *= bumperFactor;
    }
    // Tangential scoop acceleration (curves act as ramps)
    if (tangBoost > 0) {
      const tx = -ny, ty = nx;
      const tangV = ball.vx * tx + ball.vy * ty;
      const dir = tangV >= 0 ? 1 : -1;
      ball.vx += tx * dir * tangBoost;
      ball.vy += ty * dir * tangBoost;
    }
    // Hard speed cap — prevent infinite energy accumulation
    const spd = Math.hypot(ball.vx, ball.vy);
    if (spd > MAX_BALL_SPEED) {
      const sc = MAX_BALL_SPEED / spd;
      ball.vx *= sc; ball.vy *= sc;
    }
    // Visual flash on the hit segment's parent object
    if (flashTarget) flashTarget.flashTimer = FLASH_DURATION;
  }
  return true;
}

function updatePhysics(dt) {
  const W = canvas.width, H = canvas.height;

  const leftBound   = gridOffsetX;
  const rightBound  = gridOffsetX + gridSpacing * (gridCols - 1);
  const bottomBound = gridOffsetY + gridSpacing * (gridRows - 1);

  // Update each ball
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];

    // Resting balls: fade out then remove
    if (b.atRest) {
      b.fadeTimer += dt;
      b.opacity = Math.max(0, 1.0 - b.fadeTimer / FADE_DURATION);
      if (b.opacity <= 0) { balls.splice(i, 1); }
      continue;
    }

    // Trail
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 6) b.trail.shift();

    const br = b.props.radius;

    // Substep: if moving fast enough to potentially tunnel, use 2 sub-steps
    const spd0 = Math.hypot(b.vx, b.vy);
    const substeps = (spd0 * dt > br * 0.85) ? 2 : 1;
    const subDt = dt / substeps;

    for (let sub = 0; sub < substeps; sub++) {
      // Gravity
      b.vy += GRAVITY * subDt;

      // Move
      b.x += b.vx * subDt;
      b.y += b.vy * subDt;

      // Wall collisions — bumper boost
      for (const w of walls) reflectSeg(b, w.ax, w.ay, w.bx, w.by, BUMPER_FACTOR_WALL, w);

      // Curve collisions — bumper boost + tangential scoop
      for (const c of curves) {
        for (const s of sampleCurve(c, 20)) reflectSeg(b, s.ax, s.ay, s.bx, s.by, BUMPER_FACTOR_CURVE, c, CURVE_TANG_BOOST);
      }

      // Peg collisions — pinball bumper boost
      for (const peg of pegs) {
        const pdx = b.x - peg.x, pdy = b.y - peg.y;
        const pdist = Math.sqrt(pdx*pdx + pdy*pdy);
        const pminD = b.props.radius + PEG_RADIUS;
        if (pdist < pminD && pdist > 0.001) {
          const pnx = pdx/pdist, pny = pdy/pdist;
          b.x += pnx * (pminD - pdist);
          b.y += pny * (pminD - pdist);
          const pdot = b.vx*pnx + b.vy*pny;
          if (pdot < 0) {
            const r = b.props.restitution;
            b.vx -= (1+r) * pdot * pnx;
            b.vy -= (1+r) * pdot * pny;
            // Peg bumper boost — feel like a pinball bumper
            b.vx *= BUMPER_FACTOR_PEG;
            b.vy *= BUMPER_FACTOR_PEG;
            // Speed cap
            const ps = Math.hypot(b.vx, b.vy);
            if (ps > MAX_BALL_SPEED) { b.vx *= MAX_BALL_SPEED/ps; b.vy *= MAX_BALL_SPEED/ps; }
            // Plinko random kick ±8° (slightly bigger spread)
            const ang = (Math.random()-0.5) * (16 * Math.PI/180);
            const cos = Math.cos(ang), sin = Math.sin(ang);
            const nvx = b.vx*cos - b.vy*sin;
            const nvy = b.vx*sin + b.vy*cos;
            b.vx = nvx; b.vy = nvy;
            peg.pulseTimer = 0.35;
          }
        }
      }

      // Boundary: bottom (grid-aligned)
      if (b.y + br > bottomBound) {
        b.y = bottomBound - br;
        if (b.vy > 0) b.vy = -b.vy * b.props.restitution;
        b.vx *= 0.97;  // ground friction
      }
    }

    // Off-screen removal (top only, shouldn't happen normally)
    if (b.y > H + 120) { balls.splice(i, 1); continue; }

    // Play zone exit: ball drifted outside grid bounds — start fast fade
    if (!b.fading && (b.x - br < leftBound || b.x + br > rightBound)) {
      b.fading = true;
      b.fadeTimer = 0;
    }

    // Advance exit-fade and remove when done
    if (b.fading) {
      b.fadeTimer += dt;
      b.opacity = Math.max(0, 1.0 - b.fadeTimer / FADE_DURATION_EXIT);
      if (b.opacity <= 0) { balls.splice(i, 1); continue; }
    }

    // Rest detection
    const speed = Math.hypot(b.vx, b.vy);
    if (speed < REST_SPEED) {
      b.restTimer += dt;
      if (b.restTimer > REST_TIME) {
        b.atRest = true;
        b.vx = 0; b.vy = 0;
        b.trail = [];
      }
      // Gentle damping at low speed
      b.vx *= 0.97;
      b.vy *= 0.97;
    } else {
      b.restTimer = 0;
    }
  }

  // Ball-ball collisions (O(n²) — fine for ≤200)
  for (let i = 0; i < balls.length; i++) {
    for (let j = i+1; j < balls.length; j++) {
      const a = balls[i], b = balls[j];
      if (a.atRest && b.atRest) continue;

      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minD = a.props.radius + b.props.radius;
      if (dist >= minD || dist < 0.001) continue;

      const nx = dx/dist, ny = dy/dist;
      const overlap = (minD - dist) * 0.5;
      a.x -= nx*overlap; a.y -= ny*overlap;
      b.x += nx*overlap; b.y += ny*overlap;

      const ma = a.props.mass, mb = b.props.mass;
      const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
      const relV = dvx*nx + dvy*ny;
      if (relV > 0) {
        const impulse = (2 * relV) / (ma + mb);
        a.vx -= impulse * mb * nx; a.vy -= impulse * mb * ny;
        b.vx += impulse * ma * nx; b.vy += impulse * ma * ny;
        if (a.atRest) { a.atRest = false; a.restTimer = 0; a.fadeTimer = 0; a.opacity = 1.0; }
        if (b.atRest) { b.atRest = false; b.restTimer = 0; b.fadeTimer = 0; b.opacity = 1.0; }
      }
    }
  }

  // Peg pulse decay
  for (const p of pegs) { if (p.pulseTimer > 0) p.pulseTimer -= dt; }
  // Wall/curve flash decay
  for (const w of walls)  { if (w.flashTimer > 0) w.flashTimer -= dt; }
  for (const c of curves) { if (c.flashTimer > 0) c.flashTimer -= dt; }
}

function spawnBalls() {
  const count = BALL_COUNTS[ballCountIdx];
  const props = { ...BALL_PROPS[currentBallColor] };
  const totalW = gridSpacing * (gridCols - 1);
  const br = props.radius;
  const playLeft  = canvas.width * PLAY_ZONE_MARGIN + br;
  const playRight = canvas.width * (1 - PLAY_ZONE_MARGIN) - br;

  for (let i = 0; i < count; i++) {
    if (balls.length >= MAX_BALLS) break;
    const t = count === 1 ? 0.5 : i / (count - 1);
    const jx = (Math.random() - 0.5) * gridSpacing * 0.9;
    const jy = (Math.random() - 0.5) * 18;
    const vy = 130 * props.speed + Math.random() * 40;
    const rawX = gridOffsetX + t * totalW + jx;
    balls.push({
      id: nextBallId++,
      x: Math.max(playLeft, Math.min(playRight, rawX)),
      y: gridOffsetY - 28 + jy,
      vx: (Math.random() - 0.5) * 55,
      vy,
      props,
      trail: [],
      atRest: false,
      restTimer: 0,
      fading: false,
      fadeTimer: 0,
      opacity: 1.0,
    });
  }
}

// ============================================================
// RENDERING
// ============================================================
function drawGrid() {
  ctx.fillStyle = 'rgba(90, 115, 170, 0.38)';
  for (const d of dots) {
    ctx.beginPath();
    ctx.arc(d.x, d.y, DOT_RADIUS, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawWalls() {
  ctx.lineCap = 'round';
  ctx.lineWidth = WALL_HALF_W * 2;
  for (const w of walls) {
    const flash = Math.max(0, w.flashTimer || 0) / FLASH_DURATION;
    ctx.save();
    if (flash > 0) {
      ctx.strokeStyle = '#FFFACC';
      ctx.shadowColor = '#FFE030';
      ctx.shadowBlur = 6 + 22 * flash;
    } else {
      ctx.strokeStyle = '#D4B896';
      ctx.shadowColor = 'rgba(212,184,150,0.35)';
      ctx.shadowBlur = 5;
    }
    ctx.beginPath();
    ctx.moveTo(w.ax, w.ay);
    ctx.lineTo(w.bx, w.by);
    ctx.stroke();
    ctx.restore();
  }
}

function drawCurves() {
  const showHandles = currentTool === 'curve' || currentTool === 'eraser';
  for (const c of curves) {
    const flash = Math.max(0, c.flashTimer || 0) / FLASH_DURATION;
    // Curve itself
    ctx.save();
    if (flash > 0) {
      ctx.strokeStyle = '#CCFFFF';
      ctx.shadowColor = '#00EEFF';
      ctx.shadowBlur = 6 + 22 * flash;
    } else {
      ctx.strokeStyle = '#88CCEE';
      ctx.shadowColor = 'rgba(136,204,238,0.35)';
      ctx.shadowBlur = 5;
    }
    ctx.lineWidth = WALL_HALF_W * 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(c.ax, c.ay);
    ctx.quadraticCurveTo(c.cx, c.cy, c.bx, c.by);
    ctx.stroke();
    ctx.restore();

    if (showHandles) {
      // Dashed guide lines to control point
      ctx.save();
      ctx.strokeStyle = 'rgba(136,204,238,0.45)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(c.ax, c.ay);
      ctx.lineTo(c.cx, c.cy);
      ctx.lineTo(c.bx, c.by);
      ctx.stroke();
      ctx.restore();

      // Handle circle
      ctx.beginPath();
      ctx.arc(c.cx, c.cy, HANDLE_RADIUS, 0, Math.PI*2);
      ctx.fillStyle = '#88CCEE';
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

function drawPegs() {
  for (const peg of pegs) {
    const pulse = Math.max(0, peg.pulseTimer);
    const extra = pulse > 0 ? Math.sin((pulse / 0.35) * Math.PI) * 7 : 0;
    const r = PEG_RADIUS + extra;

    ctx.save();
    ctx.shadowColor = pulse > 0 ? '#FFD700' : 'rgba(255,185,0,0.4)';
    ctx.shadowBlur  = pulse > 0 ? 18 : 7;
    ctx.beginPath();
    ctx.arc(peg.x, peg.y, r, 0, Math.PI*2);

    // Gradient fill
    const grad = ctx.createRadialGradient(peg.x - r*0.3, peg.y - r*0.3, r*0.1, peg.x, peg.y, r);
    grad.addColorStop(0, pulse > 0 ? '#FFE040' : '#FFC820');
    grad.addColorStop(1, pulse > 0 ? '#FF9000' : '#CC8800');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }
}

function drawBalls() {
  for (const b of balls) {
    const p = b.props;
    const opacity = b.opacity !== undefined ? b.opacity : 1.0;
    // Shrink slightly while resting and fading for satisfying disappearance
    const r = b.atRest ? p.radius * (0.7 + 0.3 * opacity) : p.radius;

    ctx.save();
    ctx.globalAlpha = opacity;

    // Trail
    if (!b.atRest && b.trail.length > 1) {
      for (let i = 0; i < b.trail.length; i++) {
        const alpha = (i+1) / b.trail.length * 0.38;
        const tr = r * (i+1) / b.trail.length * 0.9;
        ctx.globalAlpha = opacity * alpha;
        ctx.beginPath();
        ctx.arc(b.trail[i].x, b.trail[i].y, tr, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }
      ctx.globalAlpha = opacity;
    }

    // Glow + ball
    ctx.shadowColor = p.glow;
    ctx.shadowBlur  = 12;

    const grad = ctx.createRadialGradient(b.x - r*0.32, b.y - r*0.32, r*0.08, b.x, b.y, r);
    grad.addColorStop(0, lighten(p.color, 40));
    grad.addColorStop(0.6, p.color);
    grad.addColorStop(1, darken(p.color, 25));

    ctx.beginPath();
    ctx.arc(b.x, b.y, r, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Specular highlight
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(b.x - r*0.3, b.y - r*0.32, r*0.32, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.48)';
    ctx.fill();

    ctx.restore();
  }
}

function drawGhost() {
  if (!isDrawing || !drawStart || !ghostPos) return;
  const snapEnd = snapToDot(ghostPos.x, ghostPos.y);
  const ex = snapEnd ? snapEnd.x : ghostPos.x;
  const ey = snapEnd ? snapEnd.y : ghostPos.y;

  ctx.save();
  ctx.setLineDash([9, 8]);
  ctx.lineCap = 'round';
  ctx.lineWidth = WALL_HALF_W * 2;
  ctx.strokeStyle = currentTool === 'curve' ? 'rgba(136,204,238,0.55)' : 'rgba(212,184,150,0.55)';
  ctx.beginPath();
  ctx.moveTo(drawStart.x, drawStart.y);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  ctx.restore();

  // Highlight start and end dots
  const hlColor = currentTool === 'curve' ? 'rgba(136,204,238,0.85)' : 'rgba(212,184,150,0.85)';
  ctx.beginPath();
  ctx.arc(drawStart.x, drawStart.y, DOT_RADIUS + 5, 0, Math.PI*2);
  ctx.fillStyle = hlColor; ctx.fill();
  if (snapEnd) {
    ctx.beginPath();
    ctx.arc(snapEnd.x, snapEnd.y, DOT_RADIUS + 5, 0, Math.PI*2);
    ctx.fillStyle = hlColor; ctx.fill();
  }
}

function render(ts) {
  requestAnimationFrame(render);

  const rawDt = Math.min((ts - lastTimestamp) / 1000, 0.05);
  lastTimestamp = ts;
  physicsAccum += rawDt;

  while (physicsAccum >= FIXED_DT) {
    updatePhysics(FIXED_DT);
    physicsAccum -= FIXED_DT;
  }

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();
  drawWalls();
  drawCurves();
  drawPegs();
  drawBalls();
  drawGhost();

  // Version watermark
  ctx.save();
  ctx.font = '11px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('v1.4', canvas.width - 8, canvas.height - 8);
  ctx.restore();
}

// ============================================================
// COLOR HELPERS
// ============================================================
function parseHex(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function lighten(hex, amt) {
  const [r,g,b] = parseHex(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(hex, amt) {
  const [r,g,b] = parseHex(hex);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

// ============================================================
// UI CONTROLS
// ============================================================
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + tool).classList.add('active');
  isDrawing = false; drawStart = null; ghostPos = null; editingCurve = null;
}

function setGridSize(size) {
  currentGridSize = size;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  const ids = { small: 'S', medium: 'M', large: 'L' };
  document.getElementById('size-' + ids[size]).classList.add('active');
  setupGrid();
}

function setBallColor(color) {
  currentBallColor = color;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + color).classList.add('active');
}

function changeBallCount(dir) {
  ballCountIdx = Math.max(0, Math.min(BALL_COUNTS.length - 1, ballCountIdx + dir));
  document.getElementById('count-display').textContent = BALL_COUNTS[ballCountIdx];
}

function dropBalls() {
  if (balls.length >= MAX_BALLS) return;
  spawnBalls();
  const btn = document.getElementById('drop-btn');
  btn.style.transform = 'scale(0.90)';
  setTimeout(() => { btn.style.transform = ''; }, 160);
}

function clearAll() {
  if (walls.length + curves.length + pegs.length + balls.length === 0) return;
  if (confirm('Clear everything and start over?')) {
    walls = []; curves = []; pegs = []; balls = [];
    isDrawing = false; drawStart = null; ghostPos = null; editingCurve = null;
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  resizeCanvas();
  setupInput();

  // Use ResizeObserver to catch flex-layout updates (handles iPad Safari timing gaps)
  if (window.ResizeObserver) {
    const ro = new ResizeObserver(() => { resizeCanvas(); });
    ro.observe(document.getElementById('canvas-container'));
  } else {
    window.addEventListener('resize', () => { resizeCanvas(); });
  }

  // Sync count display
  document.getElementById('count-display').textContent = BALL_COUNTS[ballCountIdx];

  lastTimestamp = performance.now();
  requestAnimationFrame(render);
}

// Explicitly expose onclick-referenced functions on window (bulletproof in strict mode)
window.setTool        = setTool;
window.setGridSize    = setGridSize;
window.setBallColor   = setBallColor;
window.changeBallCount = changeBallCount;
window.dropBalls      = dropBalls;
window.clearAll       = clearAll;

// Wait for full layout before init — prevents zero canvas dimensions on iPad Safari
window.addEventListener('load', init);
</script>
</body>
